# =============================================================================
# CI Pipeline — scope-limited by design
# =============================================================================
# This workflow validates plumbing, not production deployments. It runs
# preprocessing → training → evaluation against a CI-specific config that
# omits the manual `promotion` stage, because the approval gate requires
# an interactive TTY which GitHub Actions runners do not provide.
#
# As a consequence, models trained in CI are NOT promotable to Production
# after the fact: the MLflow tracking store (mlruns/) and model artefacts
# live on the ephemeral runner filesystem and are discarded when the job
# ends, and no `ModelVersion` is registered without the promotion stage.
#
# Closing this gap would require a shared MLflow backend (S3 + RDS or
# equivalent) and a `promote-from-run` CLI on top of it. Both fall outside
# the bachelor-thesis scope — see §9.3 / future-work in
# MLOPS_CI_PIPELINE_OVERVIEW.md for the rationale.
# =============================================================================

name: CI Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run pipeline
        run: run-pipeline --config src/config/pipeline_tabular_classification_ci.yaml

      - name: Print run report
        run: cat outputs/run_report.json

      - name: Upload run report
        uses: actions/upload-artifact@v4
        with:
          name: run-report
          path: outputs/run_report.json

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t mlops-prediction-api:ci-${{ github.sha }} .

      - name: Verify container imports
        run: |
          docker run --rm mlops-prediction-api:ci-${{ github.sha }} python -c "from src.deployment import startup_checks; print('OK')"
