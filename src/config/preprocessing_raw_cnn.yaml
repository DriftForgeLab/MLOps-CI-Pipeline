# =============================================================================
# src/config/preprocessing_raw_cnn.yaml — CNN preprocessing for raw DNG images
# =============================================================================
# Used when the dataset consists of raw DNG files that must be processed
# through the ISP pipeline before entering the standard CNN training flow.
#
# Flow: DNG → ISP pipeline → resize → normalize → CNN
#
# Set raw_input: false (or use preprocessing_image.yaml) for standard
# JPG/PNG datasets that skip the ISP pipeline entirely.
# =============================================================================

fail_on_nulls: true
min_rows: 10
validate_types: false
validate_labels: true
validate_on_skip: false
numeric_features: null
categorical_features: null
encoding:
  enabled: false
  strategy: "onehot"
  handle_unknown: "ignore"
  min_frequency: null
scaling:
  enabled: false
  strategy: "standard"
missing_values:
  policy: "passthrough"
  numeric_strategy: "mean"
  categorical_strategy: "most_frequent"
  fill_value: null
image:
  target_size: [64, 64]
  color_mode: "rgb"
  normalize: true
  flatten: false
  raw_input: true
  isp:
    black_level_correction:
      enabled: true
      black_level: null          # null = read from DNG metadata (RGGB: [R, G1, G2, B])

    demosaicing:
      algorithm: "bilinear"     # bilinear | malvar2004 | menon2007

    white_balance:
      r_gain: null               # null = read from DNG metadata (normalized: g=1.0)
      g_gain: null
      b_gain: null

    color_correction:
      enabled: true
      matrix: null               # null = read from DNG metadata (9 floats, row-major)

    denoising:
      algorithm: "gaussian"     # gaussian | median | none
      strength: 0.5             # [0.0, 1.0]: sigma for gaussian; scaled kernel size for median

    sharpening:
      algorithm: "unsharp_mask" # unsharp_mask | sharpen_filter | none
      radius: 1.0               # [0.1, 5.0]: unsharp mask blur radius
      amount: 1.0               # [0.0, 3.0]: unsharp mask strength

    gamma_correction:
      gamma: 2.2                # [1.0, 2.8]: standard sRGB gamma
