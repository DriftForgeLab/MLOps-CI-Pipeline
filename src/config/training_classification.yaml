# =============================================================================
# src/config/training_classification.yaml — Classification training configuration
# =============================================================================
# Defines the estimator and hyperparameters used by the `training` stage for
# tabular classification pipelines.
# =============================================================================

model:
  algorithm: random_forest      # Estimator to train. Valid: random_forest | logistic_regression

  # Hyperparameters for the selected algorithm. The keys below apply to
  # random_forest; logistic_regression expects a different set (C, solver,
  # max_iter, class_weight). See RF_HYPERPARAMS_KEYS in src/config/schema.py.
  hyperparameters:
    n_estimators: 100           # Number of decision trees in the forest.
    max_depth: null             # Maximum tree depth; null = grow until leaves are pure.
    min_samples_split: 2        # Minimum samples required to split an internal node.
    class_weight: balanced      # "balanced" reweights classes inversely to their frequency.
