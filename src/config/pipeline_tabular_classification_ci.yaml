# =============================================================================
# pipeline_tabular_classification_ci.yaml — CI variant of the tabular config
# =============================================================================
# Identical to pipeline_tabular_classification.yaml except that the
# `promotion` stage is omitted, because GitHub Actions runs without a TTY
# on stdin and the manual approval gate cannot obtain a human decision.
#
# The CI workflow exercises preprocessing, training, and evaluation
# end-to-end so the run-report and trained-model artefacts are produced;
# the promotion gate is exercised by unit tests instead.
# =============================================================================

project:
  name: "lightweight-mlops-pipeline"
  version: "0.1.0"

task_type: "classification"

random_seed: 42

pipeline_stages:
  - "preprocessing"
  - "training"
  - "evaluation"

output_dir: "outputs"

dataset: breast_cancer

data:
  raw: "data/raw"
  processed: "data/processed"
  evaluation: "data/evaluation"
  drift_scenarios: "data/drift_scenarios"

configs:
  preprocessing: "src/config/preprocessing_tabular.yaml"
  training: "src/config/training_classification.yaml"
  evaluation: "src/config/evaluation.yaml"
  deployment: "src/config/deployment.yaml"
  promotion: "src/config/promotion.yaml"
  drift: "src/config/drift.yaml"

log_level: "INFO"

mlflow:
  tracking_uri: null
  experiment_name: null
  registry_model_name: null
