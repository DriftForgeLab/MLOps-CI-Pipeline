project:
  name: "lightweight-mlops-pipeline"
  version: "0.1.0"
task_type: "image_classification_cnn"
random_seed: 42
pipeline_stages:
  - "preprocessing"
  - "training"
  - "evaluation"
  - "model_analysis"
  - "promotion"
  - "deployment"
output_dir: "outputs"

dataset: fivek  

data:
  raw: "data/raw"
  processed: "data/processed"
  evaluation: "data/evaluation"
  drift_scenarios: "data/drift_scenarios"
configs:
  preprocessing: "src/config/preprocessing_raw_image.yaml"
  training: "src/config/training_image_cnn.yaml"
  evaluation: "src/config/evaluation.yaml"
  deployment: "src/config/deployment.yaml"
  promotion: "src/config/promotion.yaml"
  drift: "src/config/drift.yaml"
log_level: "INFO"
mlflow:
  tracking_uri: null
  experiment_name: null
  registry_model_name: "lightweight-mlops-pipeline-fivek"
