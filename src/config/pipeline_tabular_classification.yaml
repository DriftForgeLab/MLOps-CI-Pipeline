# =============================================================================
# src/config/pipeline_tabular_classification.yaml — Tabular classification pipeline config
# =============================================================================
# Runs the full MLOps pipeline on the Breast Cancer Wisconsin dataset with a
# Random Forest classifier.
#
# Usage:
#   run-pipeline --config src/config/pipeline_tabular_classification.yaml
#
# Stages: preprocessing → training → evaluation → promotion → deployment
# Metrics tracked in MLflow: eval.accuracy, eval.precision, eval.recall, eval.f1_score
# Promotion gates (promotion.yaml): accuracy >= 0.80 and weighted F1 >= 0.75
# =============================================================================

project:
  name: "lightweight-mlops-pipeline"
  version: "0.1.0"

task_type: "classification"

random_seed: 42

pipeline_stages:
  - "preprocessing"
  - "training"
  - "evaluation"
  - "promotion"
  - "deployment"

output_dir: "outputs"

dataset: breast_cancer   # change to any tabular CSV dataset name under data/raw/

data:
  raw: "data/raw"
  processed: "data/processed"
  evaluation: "data/evaluation"
  drift_scenarios: "data/drift_scenarios"

configs:
  preprocessing: "src/config/preprocessing_tabular.yaml"
  training: "src/config/training_classification.yaml"
  evaluation: "src/config/evaluation.yaml"
  deployment: "src/config/deployment.yaml"
  promotion: "src/config/promotion.yaml"
  drift: "src/config/drift.yaml"

log_level: "INFO"

mlflow:
  tracking_uri: null        # env var MLFLOW_TRACKING_URI used if null; null = local mlruns/
  experiment_name: null     # defaults to project.name if null
  registry_model_name: null # defaults to "{project.name}-{task_type}" if null
