# =============================================================================
# src/config/preprocessing_cifar10.yaml - CIFAR-10 image preprocessing config
# =============================================================================
# Preserves CIFAR-10's native 32x32 resolution while keeping the standard
# CNN preprocessing policy used for other RGB image datasets.
# =============================================================================

fail_on_nulls: true
min_rows: 10
validate_types: false
validate_labels: true
validate_on_skip: false
numeric_features: null
categorical_features: null
encoding:
  enabled: false
  strategy: "onehot"
  handle_unknown: "ignore"
  min_frequency: null
scaling:
  enabled: false
  strategy: "standard"
missing_values:
  policy: "passthrough"
  numeric_strategy: "mean"
  categorical_strategy: "most_frequent"
  fill_value: null
image:
  target_size: [32, 32]
  color_mode: "rgb"
  normalize: true
  flatten: false
  augmentation:
    enabled: true
    horizontal_flip: true
    rotation_degrees: 0
    # Each original image gets (factor - 1) randomly perturbed copies.
    # Bumped from 2 → 4 so each image contributes more aug diversity.
    augmentation_factor: 4
    # Standard CIFAR random crop: pad each side by 4 then crop a random 32x32.
    random_crop_padding: 4
    # Photometric jitter (multiplicative range ±V around 1.0). Helps with
    # contrast/brightness drift families like CIFAR-10-C contrast and fog.
    brightness_jitter: 0.4
    contrast_jitter: 0.4
    saturation_jitter: 0.2
