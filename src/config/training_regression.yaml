# =============================================================================
# src/config/training_regression.yaml — Regression training configuration
# =============================================================================
# Algorithm: Histogram Gradient Boosting Regressor (sklearn.ensemble.HistGradientBoostingRegressor)
# Dataset:   California Housing (20,640 rows, 8 numeric features)
# =============================================================================

model:
  algorithm: gradient_boosting
  hyperparameters:
    max_iter: 300            # number of boosting iterations (trees)
    learning_rate: 0.05      # shrinkage — lower is more robust but needs more iterations
    max_depth: 7             # max depth per tree
    min_samples_leaf: 20     # regularisation — higher reduces overfitting on noisy leaves
    l2_regularization: 0.1   # L2 penalty on leaf weights
