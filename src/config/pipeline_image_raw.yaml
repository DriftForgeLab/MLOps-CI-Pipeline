# =============================================================================
# src/config/pipeline_image_raw.yaml — Raw DNG image classification pipeline config
# =============================================================================
# Trains a PyTorch CNN on raw DNG sensor images. Each image is first processed
# through the deterministic seven-stage ISP pipeline (black-level correction →
# demosaicing → white balance → colour correction → denoising → sharpening →
# gamma) before resize/normalise. For standard JPG/PNG inputs, use
# pipeline_image_cnn.yaml instead.
#
# Usage:
#   run-pipeline --config src/config/pipeline_image_raw.yaml
#
# Stages: preprocessing → training → evaluation → model_analysis → promotion → deployment
# Preprocessing: src/config/preprocessing_raw_image.yaml (ISP + resize + normalise).
# =============================================================================

project:
  name: "lightweight-mlops-pipeline"
  version: "0.1.0"
task_type: "image_classification_cnn"
random_seed: 42
pipeline_stages:
  - "preprocessing"
  - "training"
  - "evaluation"
  - "model_analysis"
  - "promotion"
  - "deployment"
output_dir: "outputs"

dataset: drone_raw  # change to any raw DNG dataset name under data/raw/

data:
  raw: "data/raw"
  processed: "data/processed"
  evaluation: "data/evaluation"
  drift_scenarios: "data/drift_scenarios"
configs:
  preprocessing: "src/config/preprocessing_raw_image.yaml"
  training: "src/config/training_image_cnn.yaml"
  evaluation: "src/config/evaluation.yaml"
  deployment: "src/config/deployment.yaml"
  promotion: "src/config/promotion.yaml"
  drift: "src/config/drift.yaml"
log_level: "INFO"
mlflow:
  tracking_uri: null
  experiment_name: null
  registry_model_name: "lightweight-mlops-pipeline-raw-images"
