# =============================================================================
# src/config/pipeline_cifar10.yaml — CIFAR-10 image classification pipeline config
# =============================================================================
# Trains a PyTorch CNN on CIFAR-10 imported into the standard ImageFolder PNG
# layout (data/raw/cifar10/images/<class>/*.png). This is a larger, multi-class
# benchmark variant of the standard image pipeline.
#
# Usage:
#   run-pipeline --config src/config/pipeline_cifar10.yaml
#
# Stages: preprocessing → training → evaluation → model_analysis → promotion → deployment
# =============================================================================

project:
  name: "lightweight-mlops-pipeline"
  version: "0.1.0"
task_type: "image_classification_cnn"
random_seed: 42
pipeline_stages:
  - "preprocessing"
  - "training"
  - "evaluation"
  - "model_analysis"
  - "promotion"
  - "deployment"
output_dir: "outputs"

dataset: cifar10

data:
  raw: "data/raw"
  processed: "data/processed"
  evaluation: "data/evaluation"
  drift_scenarios: "data/drift_scenarios"
configs:
  preprocessing: "src/config/preprocessing_cifar10.yaml"
  training: "src/config/training_image_cnn.yaml"
  evaluation: "src/config/evaluation.yaml"
  deployment: "src/config/deployment.yaml"
  promotion: "src/config/promotion.yaml"
  drift: "src/config/drift.yaml"
log_level: "INFO"
mlflow:
  tracking_uri: null
  experiment_name: null
  registry_model_name: "lightweight-mlops-pipeline-cifar10"
