# =============================================================================
# src/config/preprocessing_image_cnn.yaml — CNN image preprocessing config
# =============================================================================
# Same as preprocessing_image.yaml but with flatten: false.
# CNN models require spatial structure (H x W x C), not flattened 1D vectors.
# =============================================================================

fail_on_nulls: true
min_rows: 10
validate_types: false
validate_labels: true
validate_on_skip: false
numeric_features: null
categorical_features: null
encoding:
  enabled: false
  strategy: "onehot"
  handle_unknown: "ignore"
  min_frequency: null
scaling:
  enabled: false
  strategy: "standard"
missing_values:
  policy: "passthrough"
  numeric_strategy: "mean"
  categorical_strategy: "most_frequent"
  fill_value: null
image:
  target_size: [64, 64]
  color_mode: "rgb"
  normalize: true
  flatten: false             
  augmentation:
    enabled: false
    horizontal_flip: false
    rotation_degrees: 0
    augmentation_factor: 1